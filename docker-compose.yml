services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ghcr.io/kershrita/llm-council-backend:v1
    env_file:
      - .env
    environment:
      PORT: "8001"
      DATA_DIR: /app/data/conversations
    volumes:
      - council_data:/app/data/conversations
    expose:
      - "8001"
    restart: unless-stopped

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: ghcr.io/kershrita/llm-council-frontend:v1
    environment:
      PORT: "80"
      API_TARGET_HOST: backend
      API_TARGET_PORT: "8001"
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-9999}:80"
    restart: unless-stopped

volumes:
  council_data:
